name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Docs

    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/mlc-config.json'
        continue-on-error: true

      - name: Verify examples syntax
        run: |
          for file in examples/*.php; do
            echo "Checking $file..."
            php -l "$file"
          done

      - name: Verify src syntax
        run: |
          find src -name "*.php" -exec php -l {} \;
